AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cognito M2M Token Caching Service - ASP.NET Core with Client Credentials Grant'

Parameters:
  Application:
    Type: String
    Description: Application name
    Default: acsauth
  Environment:
    Type: String
    Description: Application environment (e.g. sand, prod)
  CognitoDomainPrefix:
    Type: String
    Description: Cognito hosted UI domain prefix (must be globally unique)
  ResourceServerId:
    Type: String
    Description: Identifier for the resource server (e.g. https://test.api.ats.healthcare)

Resources:

  # ================================= #
  # DYNAMO DB TABLES
  # ================================= #

  AccessTokenCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Application}-${Environment}-AccessTokenCache'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment

  ClientAppsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Application}-${Environment}-ClientApps'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: client_id
          AttributeType: S
        - AttributeName: cognito_region
          AttributeType: S
      KeySchema:
        - AttributeName: client_id
          KeyType: HASH
        - AttributeName: cognito_region
          KeyType: RANGE
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment

  # ================================= #
  # COGNITO USER POOL
  # ================================= #

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${Application}-${Environment}-m2m-pool'
      DeletionProtection: INACTIVE
      MfaConfiguration: 'OFF'
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      UserPoolTags:
        application: !Ref Application
        environment: !Ref Environment
      LambdaConfig:
        PreTokenGeneration: !GetAtt AccessTokenEnrichmentFunction.Arn

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  ResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref UserPool
      Identifier: !Ref ResourceServerId
      Name: !Sub '${Application}-${Environment}-ResourceServer'
      Scopes:
        - ScopeName: generate_token
          ScopeDescription: Generate a JWT Access Token

  # ================================= #
  # ACCESS TOKEN ENRICHMENT LAMBDA
  # ================================= #

  AccessTokenEnrichmentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt ClientAppsTable.Arn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${Application}-${Environment}-AccessTokenEnrichment:*'
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment

  AccessTokenEnrichmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Application}-${Environment}-AccessTokenEnrichment'
      Runtime: dotnet8
      Handler: AccessTokenEnrichmentDotnet::AccessTokenEnrichmentDotnet.Function::FunctionHandler
      Role: !GetAtt AccessTokenEnrichmentRole.Arn
      MemorySize: 512
      Timeout: 30
      Architectures:
        - x86_64
      Environment:
        Variables:
          ClientApps__TableName: !Ref ClientAppsTable
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment
      Code:
        S3Bucket: !Sub '${Application}-${Environment}-deployment-artifacts'
        S3Key: placeholder.zip

  CognitoInvokeEnrichmentPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AccessTokenEnrichmentFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ================================= #
  # CLIENT APP API (ASP.NET Core)
  # ================================= #

  AspNetCoreFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:DeleteUserPoolClient
                Resource:
                  - !GetAtt UserPool.Arn
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:PutItem
                  - dynamodb:DescribeTable
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ClientAppsTable.Arn
                  - !Sub '${ClientAppsTable.Arn}/index/*'
                  - !GetAtt AccessTokenCacheTable.Arn
                  - !Sub '${AccessTokenCacheTable.Arn}/index/*'
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment

  AspNetCoreFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Application}-${Environment}-ClientAppApi'
      Runtime: dotnet8
      Handler: Ats.Cognito.ClientApp.Api
      Role: !GetAtt AspNetCoreFunctionRole.Arn
      MemorySize: 512
      Timeout: 30
      Architectures:
        - x86_64
      Environment:
        Variables:
          Cognito__UserPoolId: !Ref UserPool
          Cognito__Domain: !Sub '${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
          DynamoDB__AccessTokenCacheTable: !Ref AccessTokenCacheTable
          DynamoDB__ClientAppsTable: !Ref ClientAppsTable
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment
      Code:
        S3Bucket: !Sub '${Application}-${Environment}-deployment-artifacts'
        S3Key: placeholder.zip

  # ================================= #
  # API GATEWAY
  # ================================= #

  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${Application}-${Environment}-ClientAppApi'
      Description: M2M Token Caching Service API
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment

  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: '{proxy+}'

  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !GetAtt ApiGateway.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AspNetCoreFunction.Arn}/invocations'

  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: AWS_IAM
      RequestParameters:
        method.request.path.proxy: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AspNetCoreFunction.Arn}/invocations'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RootMethod
      - ProxyMethod
    Properties:
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AspNetCoreFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*'

  # ================================= #
  # CI/CD DEPLOYMENT USER (Azure DevOps)
  # ================================= #

  DeploymentUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub '${Application}-${Environment}-DeploymentUser'
      Tags:
        - Key: application
          Value: !Ref Application
        - Key: environment
          Value: !Ref Environment

  DeploymentUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${Application}-${Environment}-LambdaDeploy'
      Users:
        - !Ref DeploymentUser
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:UpdateFunctionCode
              - lambda:GetFunction
              - lambda:UpdateFunctionConfiguration
              - lambda:GetFunctionConfiguration
            Resource:
              - !GetAtt AspNetCoreFunction.Arn
              - !GetAtt AccessTokenEnrichmentFunction.Arn

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/'
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn
  AccessTokenCacheTableName:
    Description: DynamoDB AccessTokenCache table name
    Value: !Ref AccessTokenCacheTable
  ClientAppsTableName:
    Description: DynamoDB ClientApps table name
    Value: !Ref ClientAppsTable
  CognitoDomain:
    Description: Cognito hosted UI domain
    Value: !Sub '${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
  DeploymentUserName:
    Description: IAM user for CI/CD deployments
    Value: !Ref DeploymentUser
